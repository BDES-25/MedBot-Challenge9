
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medbot AI Assistant</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; }
        #response { margin-top: 20px; padding: 10px; background: #e8f5e9; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Medbot AI</h2>
        <input type="text" id="user-input" placeholder="Ask a medical question...">
        <button onclick="sendMessage()">Ask</button>
        <div id="response">Waiting for question...</div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input").value;
            const resDiv = document.getElementById("response");
            resDiv.innerText = "Medbot is thinking...";

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: input })
            });
            const data = await response.json();
            resDiv.innerText = data.response;
        }
    </script>
</body>
</html>
